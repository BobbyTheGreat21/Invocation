<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noor Quotes</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
  --bg:#0f1115;
  --card:#171a21;
  --text:#e6e6e6;
  --accent:#6ee7ff;
}

body.light {
  --bg:#f7f8fa;
  --card:#ffffff;
  --text:#1f2937;
  --accent:#2563eb;
}

body {
  margin:0;
  font-family:Inter;
  background:var(--bg);
  color:var(--text);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  transition:0.3s;
  background-size:cover;
  background-position:center;
  overflow:hidden;
}

body::before {
  content:"";
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.3);
  z-index:-1;
}

button {
  border:none;
  border-radius:10px;
  background:var(--accent);
  color:#000;
  font-weight:600;
  cursor:pointer;
  transition:0.2s;
}

button:hover {
  transform:scale(1.03);
}

.top {
  position:fixed;
  top:15px;
  right:15px;
  display:flex;
  gap:10px;
  z-index:10;
}

.settings {
  position:relative;
}

.panel {
  display:none;
  position:absolute;
  right:0;
  top:40px;
  background:var(--card);
  padding:12px;
  border-radius:10px;
  width:180px;
}

/* MOOD SCREEN */

.mood-screen {
  position:absolute;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.mood-card {
  background:var(--card);
  padding:40px;
  border-radius:18px;
  text-align:center;
  max-width:700px;
  width:100%;
}

.mood-card h1 {
  margin-top:0;
  margin-bottom:25px;
  font-size:30px;
}

.moods {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:12px;
}

.moods button {
  padding:14px;
  font-size:15px;
}

/* VERSE SCREEN */

.container {
  text-align:center;
  max-width:700px;
  padding:20px;
}

.card {
  background:var(--card);
  padding:40px;
  border-radius:16px;
}

.verse {
  font-size:20px;
  line-height:1.7;
  min-height:120px;
  opacity:0;
  transition:0.4s;
}

.verse-btn {
  margin-top:15px;
  padding:10px 14px;
}

.back-btn {
  margin-bottom:20px;
}
</style>
</head>

<body>

<div class="top">

  <button id="themeBtn" onclick="toggleTheme()">🌙</button>

  <div class="settings">

    <button onclick="toggleSettings()">⚙️</button>

    <div id="panel" class="panel">

      <p style="margin:0 0 8px;">Wallpaper</p>

      <input type="file" accept="image/*" onchange="setWallpaper(event)">
      <br><br>
      <button onclick="removeWallpaper()">Remove</button>

    </div>

  </div>

</div>

<!-- MOOD SCREEN -->
<div id="moodScreen" class="mood-screen">

  <div class="mood-card">

    <h1>How are you feeling?</h1>

    <div class="moods">

      <button onclick="startVerses('Anxious')">Anxious</button>
      <button onclick="startVerses('Depressed')">Depressed</button>
      <button onclick="startVerses('Apathetic')">Apathetic</button>
      <button onclick="startVerses('Irritable')">Irritable</button>
      <button onclick="startVerses('Hopeless')">Hopeless</button>
      <button onclick="startVerses('Melancholy')">Melancholy</button>
      <button onclick="startVerses('Overwhelmed')">Overwhelmed</button>
      <button onclick="startVerses('Resentful')">Resentful</button>
      <button onclick="startVerses('Lonely')">Lonely</button>
      <button onclick="startVerses('Guilty')">Guilty</button>
      <button onclick="startVerses('Fearful')">Fearful</button>
      <button onclick="startVerses('Restless')">Restless</button>

    </div>

  </div>

</div>

<!-- VERSE SCREEN -->
<div class="container" id="verseScreen" style="display:none;">

  <div class="card">

    <button class="back-btn" onclick="goBack()">← Back</button>

    <div id="verse" class="verse"></div>

    <button class="verse-btn" onclick="showVerse()">A Verse, please</button>

  </div>

</div>

<script>

/* =========================
   1. MOOD-BASED VERSES
   ========================= */

const moodVerses = {

  Anxious: [
    "Do not lose heart, Allah is with you.",
    "Verily in the remembrance of Allah do hearts find rest."
  ],

  Depressed: [
    "With hardship comes ease. — Qur’an 94:6",
    "Allah does not burden a soul beyond what it can bear."
  ],

  Apathetic: [
    "Even small deeds matter in the sight of Allah.",
    "Consistency is beloved even if small."
  ],

  Irritable: [
    "The strong one is not who overpowers others, but who controls himself.",
    "Hold back anger and you will find peace."
  ],

  Hopeless: [
    "Never despair of the mercy of Allah.",
    "Allah is the best of planners."
  ],

  Melancholy: [
    "Allah is close to those who call upon Him.",
    "In every sorrow there is hidden mercy."
  ],

  Overwhelmed: [
    "Allah never burdens a soul beyond what it can bear.",
    "Take it one step at a time."
  ],

  Resentful: [
    "Forgiveness is closer to piety.",
    "Let go, and Allah will replace it with peace."
  ],

  Lonely: [
    "Allah is nearer than your jugular vein.",
    "You are never truly alone."
  ],

  Guilty: [
    "Allah is Most Forgiving, Most Merciful.",
    "Turn back to Him and you will be forgiven."
  ],

  Fearful: [
    "Fear not, indeed Allah is with you.",
    "What is written for you will reach you."
  ],

  Restless: [
    "Truly in the remembrance of Allah do hearts find peace.",
    "Slow down, trust His timing."
  ]

};

/* =========================
   2. STATE
   ========================= */

let currentMood = "";
let currentList = [];

/* =========================
   3. START MOOD
   ========================= */

function startVerses(mood) {

  currentMood = mood;
  currentList = moodVerses[mood] || [];

  document.getElementById("moodScreen").style.display = "none";
  document.getElementById("verseScreen").style.display = "block";

  showVerse();
}

/* =========================
   4. BACK
   ========================= */

function goBack() {

  document.getElementById("verseScreen").style.display = "none";
  document.getElementById("moodScreen").style.display = "flex";
}

/* =========================
   5. SHOW VERSE
   ========================= */

function showVerse() {

  const box = document.getElementById("verse");

  if (currentList.length === 0) {
    box.innerText = "No verses found for this mood.";
    box.style.opacity = 1;
    return;
  }

  const random =
    currentList[Math.floor(Math.random() * currentList.length)];

  box.style.opacity = 0;

  setTimeout(() => {
    box.innerText = random;
    box.style.opacity = 1;
  }, 300);
}

/* =========================
   6. THEME
   ========================= */

function toggleTheme() {

  document.body.classList.toggle("light");

  const btn = document.getElementById("themeBtn");

  btn.innerText =
    document.body.classList.contains("light")
      ? "☀️"
      : "🌙";
}

/* =========================
   7. SETTINGS
   ========================= */

function toggleSettings() {

  const p = document.getElementById("panel");

  p.style.display =
    p.style.display === "block"
      ? "none"
      : "block";
}

/* =========================
   8. WALLPAPER
   ========================= */

function setWallpaper(e) {

  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = function(event) {

    document.body.style.backgroundImage =
      `url(${event.target.result})`;

    localStorage.setItem("wallpaper", event.target.result);
  };

  reader.readAsDataURL(file);
}

function removeWallpaper() {

  document.body.style.backgroundImage = "none";
  localStorage.removeItem("wallpaper");
}

/* =========================
   9. LOAD
   ========================= */

window.onload = function() {

  const saved = localStorage.getItem("wallpaper");

  if (saved) {
    document.body.style.backgroundImage = `url(${saved})`;
  }

  const btn = document.getElementById("themeBtn");

  btn.innerText =
    document.body.classList.contains("light")
      ? "☀️"
      : "🌙";
};

</script>

</body>
</html>
