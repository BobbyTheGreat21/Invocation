<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Najwa - Spiritual Comfort</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg:#0f1115; --card:#171a21; --text:#e6e6e6; --accent:#6ee7ff; }
        body.light { --bg:#f7f8fa; --card:#ffffff; --text:#1f2937; --accent:#2563eb; }
        
        body { 
            margin:0; font-family:'Inter', sans-serif; 
            background: var(--bg); 
            color:var(--text); 
            height:100vh; display:flex; justify-content:center; align-items:center; 
            overflow:hidden; transition:0.4s ease; 
        }

        button { border:none; border-radius:12px; background:var(--accent); color:#000; font-weight:600; cursor:pointer; transition:0.25s ease; }
        button:hover { transform:translateY(-2px); filter: brightness(1.1); }
        button:active { transform:scale(0.97); }

        .top { position:fixed; top:15px; right:15px; display:flex; gap:10px; z-index:20; }
        .panel { 
            display:none; position:absolute; right:0; top:45px; 
            background:var(--card); padding:14px; border-radius:14px; 
            width:240px; box-shadow:0 10px 30px rgba(0,0,0,0.3); 
            animation:fadeIn 0.2s ease; 
        }

        .screen { position:absolute; inset:0; display:flex; justify-content:center; align-items:center; padding:20px; transition: 0.3s; }
        .hidden { display:none !important; }

        .mood-card, .card { 
            background:var(--card); padding:40px; border-radius:22px; 
            text-align:center; max-width:600px; width:100%; 
            box-shadow:0 20px 50px rgba(0,0,0,0.35); 
        }

        .moods { display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:12px; margin-top:20px; }
        .moods button { padding:14px; border-radius:14px; color: var(--text); background: rgba(110, 231, 255, 0.1); border: 1px solid var(--accent); }
        .moods button:hover { background: var(--accent); color: #000; }

        .verse { font-size:18px; line-height:1.7; min-height:120px; opacity:0; transform:translateY(8px); transition:0.4s ease; margin: 20px 0; white-space: pre-line; }
        .verse.show { opacity:1; transform:translateY(0); }

        .verse-btn { padding:12px 20px; width: 100%; margin-top: 10px; }
        .back-btn { background: transparent; color: var(--accent); margin-bottom: 15px; font-size: 14px; }
        .fav-btn { margin-top: 10px; background:transparent; border: 1px solid gold; color: gold; padding: 8px; width: 100%; }
        
        .small-btn { width:100%; margin-bottom:6px; padding:9px; border-radius:10px; }

        @keyframes fadeIn { from {opacity:0; transform:translateY(8px);} to {opacity:1; transform:translateY(0);} }
    </style>
</head>
<body>

<div class="top">
    <button id="themeBtn" onclick="toggleTheme()" style="padding: 10px;">🌙</button>
    <div style="position:relative;">
        <button onclick="toggleSettings()" style="padding: 10px;">⚙️</button>
        <div id="panel" class="panel">
            <button class="small-btn" onclick="viewFavourites()">View Saved ⭐</button>
        </div>
    </div>
</div>

<div id="moodScreen" class="screen">
    <div class="mood-card">
        <h1>How are you feeling?</h1>
        <div class="moods">
            <button onclick="startVerses('Anxious')">Anxious</button>
            <button onclick="startVerses('Depressed')">Depressed</button>
            <button onclick="startVerses('Lonely')">Lonely</button>
            <button onclick="startVerses('Overwhelmed')">Overwhelmed</button>
            <button onclick="startVerses('Guilty')">Ashamed</button>
            <button onclick="startVerses('Betrayed')">Betrayed</button>
            <button onclick="startVerses('Fearful')">Fearful</button>
            <button onclick="startVerses('Restless')">Restless</button>
        </div>
    </div>
</div>

<div id="verseScreen" class="screen hidden">
    <div class="card">
        <button class="back-btn" onclick="goBack()">← Back to Moods</button>
        <div id="verse" class="verse"></div>
        <button class="verse-btn" onclick="showVerse()">Get another Du'a</button>
        <button class="fav-btn" onclick="saveFavourite()">Save to Favourites ⭐</button>
    </div>
</div>

<script>
const moodVerses = {
    Anxious: [
        "اللهم إني أعوذ بك من الهم والحزن\nAllāhumma innī a‘ūdhu bika min al-hammi wal-ḥazan\nO Allah, I seek refuge in You from anxiety and sorrow.",
        "حسبي الله لا إله إلا هو عليه توكلت وهو رب العرش العظيم\nḤasbiyallāhu lā ilāha illā Huwa, ‘alayhi tawakkaltu wa Huwa Rabbul-‘Arshil-‘Aẓīm\nAllah is sufficient for me; I rely on Him, Lord of the Mighty Throne.",
        "اللهم رحمتك أرجو فلا تكلني إلى نفسي طرفة عين\nAllāhumma raḥmataka arjū fa-lā takilnī ilā nafsī ṭarfata ‘ayn\nO Allah, I hope for Your mercy, do not leave me to myself even for a moment.",
        "يا حي يا قيوم برحمتك أستغيث أصلح لي شأني كله\nYā Ḥayyū yā Qayyūm, bi-raḥmatika astaghīth, aṣliḥ lī sha’nī kullah\nO Ever-Living, O Sustainer, I seek Your mercy—set right all my affairs.",
        "اللهم لا سهل إلا ما جعلته سهلاً\nAllāhumma lā sahla illā mā ja‘altahu sahlā\nO Allah, nothing is easy except what You make easy.",
        "اللهم إني أعوذ بك من الجبن والبخل\nAllāhumma innī a‘ūdhu bika minal-jubni wal-bukhl\nO Allah, I seek refuge in You from fear and miserliness.",
        "اللهم ثبت قلبي على دينك\nAllāhumma thabbit qalbī ‘alā dīnik\nO Allah, keep my heart firm upon Your faith.",
        "رب إني مسني الضر وأنت أرحم الراحمين\nRabbi innī massaniyaḍ-ḍurru wa anta arḥamur-rāḥimīn\nMy Lord, harm has touched me, and You are the Most Merciful.",
        "لا إله إلا أنت سبحانك إني كنت من الظالمين\nLā ilāha illā anta subḥānaka innī kuntu minaẓ-ẓālimīn\nThere is no god but You, glory be to You; I was among the wrongdoers.",
        "اللهم اكفني بحلالك عن حرامك وأغنني بفضلك عمن سواك\nAllāhumma ikfinī bi-ḥalālika ‘an ḥarāmik wa aghninī bi-faḍlika ‘amman siwāk\nO Allah, suffice me with what You made lawful over what is unlawful, and enrich me by Your grace over all others."
    ],
    Depressed: [
        "إِنَّ مَعَ الْعُسْرِ يُسْرًا\nIndeed, with hardship comes ease.",
        "اللَّهُمَّ رَحْمَتَكَ أَرْجُو\nO Allah, I hope for Your mercy.",
        "أَلَا بِذِكْرِ اللَّهِ تَطْمَئِنُّ الْقُلُوبُ\nVerily, in the remembrance of Allah do hearts find rest."
    ],
    Lonely: [
        "اللَّهُمَّ آنِسْ وَحْشَتِي\nO Allah, comfort my loneliness.",
        "اللَّهُمَّ لَا تَذَرْنِي فَرْدًا\nO Allah, do not leave me alone.",
        "إِنَّمَا أَشْكُو بَثِّي وَحُزْنِي إِلَى اللَّهِ\nI only complain of my sorrow and grief to Allah."
    ],
    Overwhelmed: [
        "لَا يُكَلِّفُ اللَّهُ نَفْسًا إِلَّا وُسْعَهَا\nAllah does not burden a soul beyond what it can bear.",
        "رَبِّ اشْرَحْ لِي صَدْرِي\nMy Lord, expand for me my chest.",
        "يَا حَيُّ يَا قَيُّومُ بِرَحْمَتِكَ أَستَغِيُث\nO Ever-Living, O Sustainer, I seek help through Your mercy."
    ],
    Guilty: [
        "لَا تَقْنَطُوا مِنْ رَحْمَةِ اللَّهِ\nDo not despair of the mercy of Allah.",
        "اللَّهُمَّ إِنَّكَ عَفُوٌّ تُحِبُّ الْعَفْوَ فَاعْفُ عَنِّي\nO Allah, You are Forgiving and love forgiveness, so forgive me."
    ],
    Betrayed: [
        "فَصَبْرٌ جَمِيلٌ\nSo patience is most fitting.",
        "وَأُفَوِّضُ أَمْرِي إِلَى اللَّهِ\nI entrust my affair to Allah."
    ],
    Fearful: [
        "لَا تَخَفْ إِنَّ اللَّهَ مَعَنَا\nDo not fear, indeed Allah is with us.",
        "أَلَيْسَ اللَّهُ بِكَافٍ عَبْدَهُ\nIs Allah not sufficient for His servant?"
    ],
    Restless: [
        "أَلَا بِذِكْرِ اللَّهِ تَطْمَئِنُّ الْقُلُوبُ\nVerily, in the remembrance of Allah do hearts find rest."
    ]
};

let currentMood = "";

function startVerses(mood) {
    currentMood = mood;
    document.getElementById("moodScreen").classList.add("hidden");
    document.getElementById("verseScreen").classList.remove("hidden");
    showVerse();
}

function showVerse() {
    const box = document.getElementById("verse");
    const list = moodVerses[currentMood] || ["No Du'as found."];
    const v = list[Math.floor(Math.random() * list.length)];
    
    box.classList.remove("show");
    setTimeout(() => {
        box.innerText = v;
        box.classList.add("show");
    }, 150);
}

function goBack() {
    document.getElementById("verseScreen").classList.add("hidden");
    document.getElementById("moodScreen").classList.remove("hidden");
}

function toggleSettings() {
    const p = document.getElementById("panel");
    p.style.display = (p.style.display === "block") ? "none" : "block";
}

function toggleTheme() {
    document.body.classList.toggle("light");
    document.getElementById("themeBtn").innerText = document.body.classList.contains("light") ? "☀️" : "🌙";
}

function saveFavourite() {
    const verse = document.getElementById("verse").innerText;
    if (!verse) return;
    let favs = JSON.parse(localStorage.getItem("favs")) || [];
    if (!favs.includes(verse)) {
        favs.push(verse);
        localStorage.setItem("favs", JSON.stringify(favs));
        alert("Saved to Favourites ⭐");
    } else {
        alert("Already in Favourites!");
    }
}

function viewFavourites() {
    let favs = JSON.parse(localStorage.getItem("favs")) || [];
    if (favs.length === 0) {
        alert("No favourites saved yet.");
    } else {
        alert("Your Favourites:\n\n" + favs.join("\n\n---\n\n"));
    }
}
</script>

</body>
</html>
