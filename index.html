<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Najwa - Spiritual Comfort</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg:#f7f8fa; --card:#ffffff; --text:#1f2937; --accent:#2563eb; --danger:#ef4444; }
        body.dark { --bg:#0f1115; --card:#171a21; --text:#e6e6e6; --accent:#6ee7ff; }
        
        body { 
            margin:0; font-family:'Inter', sans-serif; 
            background: var(--bg); color:var(--text); 
            height:100vh; display:flex; justify-content:center; align-items:center; 
            overflow:hidden; transition: 0.3s ease; 
        }

        button { border:none; border-radius:12px; background:var(--accent); color:#fff; font-weight:600; cursor:pointer; transition:0.2s ease; }
        body.dark button { color: #000; }
        button:hover { transform:translateY(-2px); filter: brightness(1.1); }
        button:active { transform:scale(0.97); }

        .top { position:fixed; top:15px; right:15px; display:flex; gap:10px; z-index:100; }
        .panel { 
            display:none; position:absolute; right:0; top:45px; 
            background:var(--card); padding:14px; border-radius:14px; 
            width:240px; box-shadow:0 10px 30px rgba(0,0,0,0.1); 
            animation:fadeIn 0.2s ease; 
        }

        .screen { position:absolute; inset:0; display:flex; flex-direction:column; justify-content:center; align-items:center; padding:20px; transition: 0.3s; overflow-y: auto; }
        .hidden { display:none !important; }

        .mood-card, .card { 
            background:var(--card); padding:40px; border-radius:22px; 
            text-align:center; max-width:600px; width:100%; 
            box-shadow:0 20px 50px rgba(0,0,0,0.05); 
        }

        .moods { display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:12px; margin-top:20px; }
        .moods button { padding:14px; border-radius:14px; color: var(--text); background: transparent; border: 1px solid var(--accent); }
        .moods button:hover { background: var(--accent); color: #fff; }

        .verse { font-size:18px; line-height:1.8; min-height:120px; opacity:0; transition:0.25s ease; margin: 20px 0; white-space: pre-line; }
        .verse.show { opacity:1; }

        /* Sanctuary Specific Styling */
        #sanctuaryList { width: 100%; max-width: 600px; display: flex; flex-direction: column; gap: 15px; padding-bottom: 40px; }
        .fav-item { 
            background: var(--card); padding: 25px; border-radius: 18px; 
            text-align: left; position: relative; box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            animation: fadeIn 0.3s ease; white-space: pre-line; line-height: 1.6;
        }
        .delete-btn { 
            background: transparent; color: var(--danger); font-size: 12px; 
            margin-top: 15px; padding: 5px 10px; border: 1px solid var(--danger); 
        }
        .delete-btn:hover { background: var(--danger); color: white; }

        .nav-btn { background: transparent; color: var(--accent); padding: 10px; margin-bottom: 20px; }
        .header-title { margin-bottom: 20px; font-weight: 600; }

        @keyframes fadeIn { from {opacity:0; transform:translateY(10px);} to {opacity:1; transform:translateY(0);} }
    </style>
</head>
<body>

<div class="top">
    <button id="themeBtn" onclick="toggleTheme()" style="padding: 10px; background: transparent;">🌙</button>
    <div style="position:relative;">
        <button onclick="toggleSettings()" style="padding: 10px; background: transparent;">⚙️</button>
        <div id="panel" class="panel">
            <button style="width:100%; padding:10px;" onclick="viewSanctuary()">My Sanctuary ⭐</button>
        </div>
    </div>
</div>

<!-- Mood Selection -->
<div id="moodScreen" class="screen">
    <div class="mood-card">
        <h1>How are you feeling?</h1>
        <div class="moods">
            <button onclick="startVerses('Anxious')">Anxious</button>
            <button onclick="startVerses('Depressed')">Depressed</button>
            <button onclick="startVerses('Lonely')">Lonely</button>
            <button onclick="startVerses('Overwhelmed')">Overwhelmed</button>
            <button onclick="startVerses('Guilty')">Ashamed</button>
            <button onclick="startVerses('Betrayed')">Betrayed</button>
            <button onclick="startVerses('Fearful')">Fearful</button>
            <button onclick="startVerses('Restless')">Restless</button>
        </div>
    </div>
</div>

<!-- Verse Display -->
<div id="verseScreen" class="screen hidden">
    <div class="card">
        <button class="nav-btn" onclick="showScreen('moodScreen')">← Back to Moods</button>
        <div id="verse" class="verse"></div>
        <button style="width:100%; padding:14px; margin-bottom:10px;" onclick="showVerse()">Get another Du'a</button>
        <button style="width:100%; padding:10px; background:transparent; border:1px solid #d4af37; color:#d4af37;" onclick="saveFavourite()">Save to Sanctuary ⭐</button>
    </div>
</div>

<!-- Sanctuary List -->
<div id="sanctuaryScreen" class="screen hidden" style="justify-content: flex-start;">
    <button class="nav-btn" onclick="showScreen('moodScreen')" style="margin-top:60px;">← Back Home</button>
    <h2 class="header-title">My Sanctuary</h2>
    <div id="sanctuaryList"></div>
</div>

<script>
// (Mood data remains the same as your original)
const moodVerses = {
    Anxious: [
        "اللهم إني أعوذ بك من الهم والحزن\nAllāhumma innī a‘ūdhu bika min al-hammi wal-ḥazan\nO Allah, I seek refuge in You from anxiety and sorrow.",
        "حسبي الله لا إله إلا هو عليه توكلت وهو رب العرش العظيم\nḤasbiyallāhu lā ilāha illā Huwa, ‘alayhi tawakkaltu wa Huwa Rabbul-‘Arshil-‘Aẓīm\nAllah is sufficient for me; I rely on Him, Lord of the Mighty Throne.",
        "اللهم رحمتك أرجو فلا تكلني إلى نفسي طرفة عين\nAllāhumma raḥmataka arjū fa-lā takilnī ilā nafsī ṭarfata ‘ayn\nO Allah, I hope for Your mercy, do not leave me to myself even for a moment.",
        "يا حي يا قيوم برحمتك أستغيث أصلح لي شأني كله\nYā Ḥayyū yā Qayyūm, bi-raḥmatika astaghīth, aṣliḥ lī sha’nī kullah\nO Ever-Living, O Sustainer, I seek Your mercy—set right all my affairs."
    ],
    Depressed: [
        "اللَّهُمَّ إِنِّي أَعُوذُ بِكَ مِنَ الْهَمِّ وَالْحَزَنِ\nAllahumma inni a‘udhu bika minal-hammi wal-hazan\nO Allah, I seek refuge in You from anxiety and sorrow.",
        "لَا إِلَٰهَ إِلَّا أَنتَ سُبْحَانَكَ إِنِّي كُنتُ مِنَ الظَّالِمِينَ\nLa ilaha illa anta subhanaka inni kuntu minaz-zalimeen\nThere is no deity except You; glory be to You. Indeed, I was among the wrongdoers."
    ],
    Lonely: [
        "اللَّهُمَّ آنِسْ وَحْشَتِي وَاجْبُرْ كَسْرِي\nAllahumma anis wahshati wajbur kasri\nO Allah, comfort my loneliness and mend my brokenness.",
        "إِنَّمَا أَشْكُو بَثِّي وَحُزْنِي إِلَى اللَّهِ\nInnama ashkoo bathee wa huzni ilallah\nI only complain of my sorrow and grief to Allah."
    ],
    Overwhelmed: [
        "لَا يُكَلِّفُ اللَّهُ نَفْسًا إِلَّا وُسْعَهَا\nLa yukallifullahu nafsan illa wus‘aha\nAllah does not burden a soul beyond what it can bear.",
        "رَبِّ اشْرَحْ لِي صَدْرِي وَيَسِّرْ لِي أَمْرِي\nRabbi ishrah li sadri wa yassir li amri\nMy Lord, expand for me my chest and make my task easy for me."
    ],
    Guilty: [
        "لَا تَقْنَطُوا مِنْ رَحْمَةِ اللَّهِ\nLa taqnatoo min rahmatillah\nDo not despair of the mercy of Allah.",
        "اللَّهُمَّ إِنَّكَ عَفُوٌّ تُحِبُّ الْعَفْوَ فَاعْفُ عَنِّي\nAllahumma innaka ‘afuwwun tuhibbul ‘afwa fa‘fu ‘anni\nO Allah, You are Most Forgiving and love forgiveness, so forgive me."
    ],
    Betrayed: [
        "حَسْبِيَ اللَّهُ وَنِعْمَ الْوَكِيلُ\nHasbiyallahu wa ni‘mal wakeel\nAllah is sufficient for me, and He is the best disposer of affairs.",
        "فَصَبْرٌ جَمِيلٌ وَاللَّهُ الْمُسْتَعَانُ\nFasabrun jameel wallahu al-musta‘an\nSo patience is most fitting, and Allah is the one sought for help."
    ],
    Fearful: [
        "لَا تَخَفْ إِنَّ اللَّهَ مَعَنَا\nLa takhaf innallaha ma‘ana\nDo not fear, indeed Allah is with us.",
        "أَلَيْسَ اللَّهُ بِكَافٍ عَبْدَهُ\nAlaisa Allahu bikafin ‘abdah\nIs Allah not sufficient for His servant?"
    ],
    Restless: [
        "أَلَا بِذِكْرِ اللَّهِ تَطْمَئِنُّ الْقُلُوبُ\nAla bidhikrillahi tatma’innul quloob\nVerily, in the remembrance of Allah do hearts find rest.",
        "اللَّهُمَّ أَلْهِمْنِي السَّكِينَةَ وَالطُّمَأْنِينَةَ\nAllahumma alhimni as-sakeenata wat-tuma’nina\nO Allah, inspire in me peace and tranquility."
    ]
};

let currentMood = "";
let lastIndex = -1;

function showScreen(screenId) {
    document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
    document.getElementById(screenId).classList.remove('hidden');
    document.getElementById('panel').style.display = "none";
}

function startVerses(mood) {
    currentMood = mood;
    lastIndex = -1;
    showScreen('verseScreen');
    showVerse();
}

function showVerse() {
    const box = document.getElementById("verse");
    const list = moodVerses[currentMood];
    let idx;
    do { idx = Math.floor(Math.random() * list.length); } while (idx === lastIndex && list.length > 1);
    lastIndex = idx;
    
    box.classList.remove("show");
    setTimeout(() => {
        box.innerText = list[idx];
        box.classList.add("show");
    }, 50);
}

function saveFavourite() {
    const verse = document.getElementById("verse").innerText;
    let favs = JSON.parse(localStorage.getItem("favs")) || [];
    if (!favs.includes(verse)) {
        favs.push(verse);
        localStorage.setItem("favs", JSON.stringify(favs));
        alert("Saved to Sanctuary ⭐");
    }
}

function viewSanctuary() {
    const listDiv = document.getElementById("sanctuaryList");
    const favs = JSON.parse(localStorage.getItem("favs")) || [];
    listDiv.innerHTML = "";

    if (favs.length === 0) {
        listDiv.innerHTML = "<p style='text-align:center; opacity:0.6;'>Your sanctuary is empty. Save some Du'as to see them here.</p>";
    } else {
        favs.forEach((v, index) => {
            const item = document.createElement("div");
            item.className = "fav-item";
            item.innerHTML = `
                <div>${v}</div>
                <button class="delete-btn" onclick="removeFav(${index})">Remove</button>
            `;
            listDiv.appendChild(item);
        });
    }
    showScreen('sanctuaryScreen');
}

function removeFav(index) {
    let favs = JSON.parse(localStorage.getItem("favs")) || [];
    favs.splice(index, 1);
    localStorage.setItem("favs", JSON.stringify(favs));
    viewSanctuary(); // Refresh list
}

function toggleTheme() {
    document.body.classList.toggle("dark");
    document.getElementById("themeBtn").innerText = document.body.classList.contains("dark") ? "☀️" : "🌙";
}

function toggleSettings() {
    const p = document.getElementById("panel");
    p.style.display = (p.style.display === "block") ? "none" : "block";
}
</script>

</body>
</html>
