<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Najwa</title>
    <link rel="manifest" href="manifest.json">
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* Theme Definitions */
        :root {
            /* Default: Morning Mist */
            --bg: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --text: #1f2937;
            --accent: #2563eb;
            --btn-bg: rgba(255, 255, 255, 0.4);
        }

        /* Classes for different themes */
        body.midnight {
            --bg: linear-gradient(135deg, #0f1115 0%, #1a1d23 100%);
            --text: #e6e6e6;
            --accent: #6ee7ff;
            --btn-bg: rgba(255, 255, 255, 0.05);
        }
        body.olive {
            --bg: linear-gradient(135deg, #ebebe0 0%, #a3ad91 100%);
            --text: #2f3e30;
            --accent: #4a5d4b;
            --btn-bg: rgba(255, 255, 255, 0.3);
        }
        body.golden {
            --bg: linear-gradient(135deg, #fff1eb 0%, #ace0f9 100%); /* Warm dawn vibe */
            --text: #4a3728;
            --accent: #b3932d;
            --btn-bg: rgba(255, 255, 255, 0.5);
        }
        body.deepsea {
            --bg: linear-gradient(135deg, #09203f 0%, #537895 100%);
            --text: #ffffff;
            --accent: #00d2ff;
            --btn-bg: rgba(0, 0, 0, 0.2);
        }

        body { 
            margin:0; font-family:'Inter', sans-serif; 
            background: var(--bg); 
            background-attachment: fixed;
            color:var(--text); 
            height:100vh; display:flex; justify-content:center; align-items:center; 
            overflow:hidden; transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1); 
        }

        .screen { 
            position:absolute; inset:0; 
            display:flex; flex-direction:column; justify-content:center; align-items:center; 
            padding:30px; text-align:center; transition: 0.3s; 
            overflow-y: auto;
        }
        .hidden { display:none !important; }

        button { 
            border: 1px solid rgba(128,128,128,0.2); 
            border-radius:16px; 
            background: var(--btn-bg); 
            color:var(--text); 
            font-weight:500; 
            cursor:pointer; 
            transition:0.3s ease; 
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            outline: none;
        }
        button:hover { transform: translateY(-2px); border-color: var(--accent); }

        /* Settings Icon */
        .top-nav { position:fixed; top:20px; right:20px; z-index:100; }
        .settings-btn { background: transparent; border: none; font-size: 1.5rem; padding: 10px; cursor: pointer; opacity: 0.7; }
        .settings-btn:hover { opacity: 1; transform: rotate(45deg); }

        /* Enhanced Settings Panel */
        .panel { 
            display:none; position:absolute; right:0; top:60px; 
            background: var(--btn-bg); backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding:20px; border-radius:24px; width:220px; 
            border: 1px solid rgba(128,128,128,0.2);
            animation: fadeIn 0.2s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .panel h4 { margin: 15px 0 10px 0; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; opacity: 0.6; }
        .theme-grid { display: grid; grid-template-columns: 1fr; gap: 8px; margin-bottom: 20px; }
        .theme-option { padding: 10px; font-size: 13px; text-align: left; width: 100%; border-radius: 10px; }

        .moods { 
            display:grid; grid-template-columns:repeat(2, 1fr); 
            gap:15px; margin-top:30px; width: 100%; max-width: 400px;
        }
        .moods button { padding:20px 10px; font-size: 15px; }

        .verse { 
            font-size:22px; line-height:1.8; font-weight: 300;
            min-height:180px; opacity:0; transition:0.4s ease; 
            margin: 40px 0; max-width: 600px; white-space: pre-line;
        }
        .verse.show { opacity:1; }

        #favList { width: 100%; max-width: 600px; margin-top: 20px; padding-bottom: 50px; }
        .fav-item { 
            padding: 30px; border-bottom: 1px solid rgba(128,128,128,0.1);
            text-align: left; animation: fadeIn 0.3s ease; white-space: pre-line;
        }
        .fav-actions { display: flex; gap: 15px; margin-top: 15px; }

        .action-btn { background: transparent; font-size: 12px; padding: 5px 12px; border-radius: 8px; }
        .nav-btn { background: transparent; border: none; color: var(--accent); margin-bottom: 20px; }

        h1 { font-weight: 300; letter-spacing: -1px; font-size: 32px; }

        @keyframes fadeIn { from {opacity:0; transform:translateY(10px);} to {opacity:1; transform:translateY(0);} }
    </style>
</head>
<body>

<div class="top-nav">
    <button class="settings-btn" onclick="toggleSettings()">⚙️</button>
    <div id="panel" class="panel">
        <button style="width:100%; padding:12px; margin-bottom: 10px;" onclick="viewFavourites()">⭐ Favourites</button>
        
        <h4>Atmosphere</h4>
        <div class="theme-grid">
            <button class="theme-option" onclick="setTheme('default')">Morning Mist</button>
            <button class="theme-option" onclick="setTheme('midnight')">Midnight Secret</button>
            <button class="theme-option" onclick="setTheme('olive')">Olive Grove</button>
            <button class="theme-option" onclick="setTheme('golden')">Golden Hour</button>
            <button class="theme-option" onclick="setTheme('deepsea')">Deep Sea</button>
        </div>
    </div>
</div>

<!-- Screens remain identical to previous version -->
<div id="moodScreen" class="screen">
    <h1>How are you feeling?</h1>
    <div class="moods">
        <button onclick="startVerses('Anxious')">Anxious</button>
        <button onclick="startVerses('Depressed')">Depressed</button>
        <button onclick="startVerses('Lonely')">Lonely</button>
        <button onclick="startVerses('Overwhelmed')">Overwhelmed</button>
        <button onclick="startVerses('Guilty')">Ashamed</button>
        <button onclick="startVerses('Betrayed')">Betrayed</button>
        <button onclick="startVerses('Fearful')">Fearful</button>
        <button onclick="startVerses('Restless')">Restless</button>
    </div>
</div>

<div id="verseScreen" class="screen hidden">
    <button class="nav-btn" onclick="showScreen('moodScreen')">← Back to Moods</button>
    <div id="verse" class="verse"></div>
    <div style="width: 100%; max-width: 400px; display:flex; flex-direction:column; gap:10px;">
        <button style="padding:16px;" onclick="showVerse()">Get another Du'a</button>
        <div style="display:flex; gap:10px;">
            <button id="saveBtn" style="flex:1; padding:12px;" onclick="saveFavourite()">Save ⭐</button>
            <button id="mainCopyBtn" style="flex:1; padding:12px;" onclick="copyCurrentVerse()">Copy 📋</button>
        </div>
    </div>
</div>

<div id="favScreen" class="screen hidden" style="justify-content: flex-start;">
    <h2 style="margin-top: 80px; font-weight: 300;">Favourites</h2>
    <button class="nav-btn" onclick="showScreen('moodScreen')">← Back Home</button>
    <div id="favList"></div>
</div>

<script>
// Data and Logic
const moodVerses = {
    Anxious: [
        "اللهم إني أعوذ بك من الهم والحزن\nAllāhumma innī a‘ūdhu bika min al-hammi wal-ḥazan\nO Allah, I seek refuge in You from anxiety and sorrow.",
        "حسبي الله لا إله إلا هو عليه توكلت وهو رب العرش العظيم\nḤasbiyallāhu lā ilāha illā Huwa, ‘alayhi tawakkaltu wa Huwa Rabbul-‘Arshil-‘Aẓīm\nAllah is sufficient for me; I rely on Him, Lord of the Mighty Throne.",
        "اللهم رحمتك أرجو فلا تكلني إلى نفسي طرفة عين\nAllāhumma raḥmataka arjū fa-lā takilnī ilā nafsī ṭarfata ‘ayn\nO Allah, I hope for Your mercy, do not leave me to myself even for a moment.",
        "يا حي يا قيوم برحمتك أستغيث أصلح لي شأني كله\nYā Ḥayyū yā Qayyūm, bi-raḥmatika astaghīth, aṣliḥ lī sha’nī kullah\nO Ever-Living, O Sustainer, I seek Your mercy—set right all my affairs.",
        "اللهم لا سهل إلا ما جعلته سهلاً\nAllāhumma lā sahla illā mā ja‘altahu sahlā\nO Allah, nothing is easy except what You make easy."
    ],
    Depressed: [
        "إِنَّ مَعَ الْعُسْرِ يُسْرًا\nInna ma‘al usri yusra\nIndeed, with hardship comes ease.",
        "أَلَا بِذِكْرِ اللَّهِ تَطْمَئِنُّ الْقُلُوبُ\nAla bidhikrillahi tatma’innul quloob\nVerily, in the remembrance of Allah do hearts find rest.",
        "لَا إِلَٰهَ إِلَّا أَنتَ سُبْحَانَكَ إِنِّي كُنتُ مِنَ الظَّالِمِينَ\nLa ilaha illa anta subhanaka inni kuntu minaz-zalimeen\nThere is no deity except You; glory be to You. Indeed, I was among the wrongdoers."
    ],
    Lonely: [
        "اللَّهُمَّ آنِسْ وَحْشَتِي وَاجْبُرْ كَسْرِي\nAllahumma anis wahshati wajbur kasri\nO Allah, comfort my loneliness and mend my brokenness.",
        "وَهُوَ مَعَكُمْ أَيْنَ مَا كُنتُمْ\nWa huwa ma‘akum ayna mā kuntum\nAnd He is with you wherever you are."
    ],
    Overwhelmed: [
        "لَا يُكَلِّفُ اللَّهُ نَفْسًا إِلَّا وُسْعَهَا\nLa yukallifullahu nafsan illa wus‘aha\nAllah does not burden a soul beyond what it can bear.",
        "رَبِّ اشْرَحْ لِي صَدْرِي وَيَسِّرْ لِي أَمْرِي\nRabbi ishrah li sadri wa yassir li amri\nMy Lord, expand for me my chest and make my task easy for me."
    ],
    Guilty: [
        "لَا تَقْنَطُوا مِنْ رَحْمَةِ اللَّهِ\nLa taqnatoo min rahmatillah\nDo not despair of the mercy of Allah.",
        "اللَّهُمَّ إِنَّكَ عَفُوٌّ تُحِبُّ الْعَفْوَ فَاعْفُ عَنِّي\nAllahumma innaka ‘afuwwun tuhibbul ‘afwa fa‘fu ‘anni\nO Allah, You are Most Forgiving and love forgiveness, so forgive me."
    ],
    Betrayed: [
        "فَصَبْرٌ جَمِيلٌ وَاللَّهُ الْمُسْتَعَانُ\nFasabrun jameel wallahu al-musta‘an\nSo patience is most fitting, and Allah is the one sought for help.",
        "وَأُفَوِّضُ أَمْرِي إِلَى اللَّهِ\nWa ufawwidu amri ilallah\nI entrust my affair to Allah."
    ],
    Fearful: [
        "لَا تَخَفْ إِنَّ اللَّهَ مَعَنَا\nLa takhaf innallaha ma‘ana\nDo not fear, indeed Allah is with us.",
        "حَسْبُنَا اللَّهُ وَنِعْمَ الْوَكِيلُ\nHasbunallahu wa ni‘mal wakeel\nAllah is sufficient for us, and He is the best disposer of affairs."
    ],
    Restless: [
        "يَا حَيُّ يَا قَيُّومُ بِرَحْمَتِكَ أَسْتَغِيثُ\nYa Hayyu Ya Qayyum birahmatika astagheeth\nO Ever-Living, O Sustainer, I seek help through Your mercy.",
        "اللَّهُمَّ أَلْهِمْنِي السَّكِينَةَ\nAllahumma alhimni as-sakeenata\nO Allah, inspire in me tranquility."
    ]
};

let currentMood = "";
let lastIndex = -1;

function showScreen(screenId) {
    document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
    document.getElementById(screenId).classList.remove('hidden');
    document.getElementById('panel').style.display = "none";
}

function startVerses(mood) {
    currentMood = mood;
    lastIndex = -1;
    showScreen('verseScreen');
    showVerse();
}

function showVerse() {
    const box = document.getElementById("verse");
    const list = moodVerses[currentMood];
    let idx;
    do { idx = Math.floor(Math.random() * list.length); } while (idx === lastIndex && list.length > 1);
    lastIndex = idx;
    box.classList.remove("show");
    setTimeout(() => {
        box.innerText = list[idx];
        box.classList.add("show");
        document.getElementById("saveBtn").innerText = "Save ⭐";
    }, 50);
}

function toggleSettings() {
    const p = document.getElementById("panel");
    p.style.display = (p.style.display === "block") ? "none" : "block";
}

function setTheme(themeName) {
    document.body.className = themeName === 'default' ? '' : themeName;
    localStorage.setItem('najwa-theme', themeName);
}

// Load saved theme on startup
window.onload = () => {
    const savedTheme = localStorage.getItem('najwa-theme');
    if (savedTheme) setTheme(savedTheme);
};

// Functions for Favs, Copy, etc. remain the same as previous versions
function saveFavourite() {
    const verse = document.getElementById("verse").innerText;
    let favs = JSON.parse(localStorage.getItem("favs")) || [];
    if (!favs.includes(verse)) {
        favs.push(verse);
        localStorage.setItem("favs", JSON.stringify(favs));
        document.getElementById("saveBtn").innerText = "Saved!";
    }
}

function copyCurrentVerse() {
    const verse = document.getElementById("verse").innerText;
    navigator.clipboard.writeText(verse).then(() => {
        document.getElementById("mainCopyBtn").innerText = "Copied! ✅";
        setTimeout(() => { document.getElementById("mainCopyBtn").innerText = "Copy 📋"; }, 2000);
    });
}

function viewFavourites() {
    const listDiv = document.getElementById("favList");
    const favs = JSON.parse(localStorage.getItem("favs")) || [];
    listDiv.innerHTML = favs.length === 0 ? "<p>No favourites yet.</p>" : "";
    favs.forEach((v, index) => {
        const item = document.createElement("div");
        item.className = "fav-item";
        item.innerHTML = `<div>${v}</div><button onclick="removeFav(${index})" style="color:red; background:none; border:none; margin-top:10px;">Unsave</button>`;
        listDiv.appendChild(item);
    });
    showScreen('favScreen');
}

function removeFav(index) {
    let favs = JSON.parse(localStorage.getItem("favs")) || [];
    favs.splice(index, 1);
    localStorage.setItem("favs", JSON.stringify(favs));
    viewFavourites();
}
</script>

</body>
</html>
